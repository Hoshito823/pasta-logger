<!doctype html><html lang="ja"><head>
<meta charset="UTF-8" /><title>新規記録 - Pasta Logger</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/src/style.css" />
</head><body class="min-h-screen bg-gray-50 text-gray-900">
<header class="sticky top-0 bg-white/70 backdrop-blur border-b">
  <nav class="mx-auto max-w-3xl px-4 py-3 flex items-center justify-between">
    <a href="/" class="font-semibold">Pasta Logger</a>

    <!-- スマホ用メニューボタン -->
    <div class="flex items-center gap-2">
      <button id="menuToggle" class="btn p-2 md:hidden">メニュー</button>
    </div>

    <!-- デスクトップ用メニュー -->
    <div class="hidden md:flex items-center gap-3">
      <a href="/log-new.html" class="btn">作る記録</a>
      <a href="/restaurant-new.html" class="btn">食べる記録</a>
      <a href="/manage.html" class="btn">管理</a>
    </div>
  </nav>

  <!-- スマホ用ドロップダウンメニュー -->
  <div id="mobileMenu" class="hidden bg-white border-t md:hidden">
    <div class="mx-auto max-w-3xl px-4 py-3 space-y-2">
      <a href="/log-new.html" class="block py-2 px-4 hover:bg-gray-50 rounded-lg">作る記録</a>
      <a href="/restaurant-new.html" class="block py-2 px-4 hover:bg-gray-50 rounded-lg">食べる記録</a>
      <a href="/manage.html" class="block py-2 px-4 hover:bg-gray-50 rounded-lg">管理</a>
    </div>
  </div>
</header>

<main class="mx-auto max-w-3xl px-4 py-6 space-y-6">
  <h2 class="text-xl font-bold">新規記録</h2>
  <div id="auth"></div>

  <form id="logForm" class="card space-y-4" novalidate>
    <div>
      <label class="label">写真</label>
      <div class="space-y-2">
        <div class="flex gap-2">
          <button type="button" id="cameraBtn" class="btn flex-1">カメラで撮影</button>
          <button type="button" id="galleryBtn" class="btn flex-1">ギャラリーから選択</button>
        </div>
        <input type="file" id="photo" name="photo" accept="image/*" class="input hidden">
        <div id="photoPreview" class="hidden">
          <img id="previewImage" class="w-full max-w-xs h-auto rounded-lg border">
          <button type="button" id="removePhoto" class="btn text-sm mt-1">写真を削除</button>
        </div>
      </div>
    </div>

    <div><label class="label">パスタ名</label><input id="pastaName" name="pastaName" class="input" placeholder="ナスとアンチョビのペペロンチーノ"></div>

    <!-- 麺セクション -->
    <section class="card space-y-4">
      <h3 class="text-lg font-semibold">麺</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="label">麺の種類 <span class="text-red-500">*</span></label>
          <select id="pasta" name="pasta" class="input" required></select>
          <button type="button" id="addNewPasta" class="btn text-xs mt-1 w-full">新しい麺を登録</button>
        </div>
        <div>
          <label class="label">グラム数 <span class="text-red-500">*</span></label>
          <div class="flex items-center gap-2">
            <button type="button" id="pastaAmountMinus" class="btn w-8 h-8 flex items-center justify-center p-0">-</button>
            <input id="pastaAmount" name="pastaAmount" type="number" min="50" max="200" step="10" value="80" class="input text-center" required>
            <button type="button" id="pastaAmountPlus" class="btn w-8 h-8 flex items-center justify-center p-0">+</button>
            <span class="text-sm text-gray-600">g</span>
          </div>
          <div class="grid grid-cols-4 gap-1 mt-1">
            <button type="button" class="amount-preset-btn btn text-xs py-1" data-amount="70">70g</button>
            <button type="button" class="amount-preset-btn btn text-xs py-1" data-amount="80">80g</button>
            <button type="button" class="amount-preset-btn btn text-xs py-1" data-amount="90">90g</button>
            <button type="button" class="amount-preset-btn btn text-xs py-1" data-amount="100">100g</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 茹で時間設定 -->
    <div>
      <label class="label">茹で時間</label>
      <div class="space-y-2">
        <!-- 分と秒の個別設定 -->
        <div class="flex items-center gap-2">
          <div class="flex items-center gap-1 flex-1">
            <button type="button" id="boilMinuteMinus" class="btn w-6 h-6 flex items-center justify-center p-0 text-xs">-</button>
            <input id="boilMinutes" type="number" min="0" max="9" value="8" class="input text-center w-12 text-sm">
            <button type="button" id="boilMinutePlus" class="btn w-6 h-6 flex items-center justify-center p-0 text-xs">+</button>
            <span class="text-xs text-gray-600">分</span>
          </div>
          <div class="flex items-center gap-1 flex-1">
            <button type="button" id="boilSecondMinus" class="btn w-6 h-6 flex items-center justify-center p-0 text-xs">-</button>
            <input id="boilSeconds" type="number" min="0" max="59" step="10" value="0" class="input text-center w-12 text-sm">
            <button type="button" id="boilSecondPlus" class="btn w-6 h-6 flex items-center justify-center p-0 text-xs">+</button>
            <span class="text-xs text-gray-600">秒</span>
          </div>
        </div>
        <!-- プリセットボタン -->
        <div class="grid grid-cols-3 gap-1 text-xs">
          <button type="button" class="boil-preset-btn btn py-1 px-1" data-minutes="6" data-seconds="30">6:30</button>
          <button type="button" class="boil-preset-btn btn py-1 px-1" data-minutes="7" data-seconds="0">7:00</button>
          <button type="button" class="boil-preset-btn btn py-1 px-1" data-minutes="8" data-seconds="0">8:00</button>
          <button type="button" class="boil-preset-btn btn py-1 px-1" data-minutes="9" data-seconds="0">9:00</button>
          <button type="button" class="boil-preset-btn btn py-1 px-1" data-minutes="10" data-seconds="0">10:00</button>
        </div>
        <!-- 隠しフィールド（従来の秒単位での値を保持） -->
        <input id="boilTime" name="boilTime" type="hidden" value="480">
      </div>
    </div>

    <!-- 水量・塩・茹で汁 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div>
        <label class="label">水量(L)</label>
        <input id="waterAmount" name="waterAmount" type="number" step="0.1" class="input" placeholder="2.0" value="2.0">
        <!-- 水量プリセットボタン -->
        <div class="grid grid-cols-4 gap-1 mt-1">
          <button type="button" class="water-preset-btn btn text-xs py-1" data-water="1.0">1.0L</button>
          <button type="button" class="water-preset-btn btn text-xs py-1" data-water="1.5">1.5L</button>
          <button type="button" class="water-preset-btn btn text-xs py-1" data-water="2.0">2.0L</button>
          <button type="button" class="water-preset-btn btn text-xs py-1" data-water="2.5">2.5L</button>
        </div>
      </div>
      <div><label class="label">塩(g)</label><input id="saltAmount" name="saltAmount" type="number" step="1" class="input" placeholder="25" value="25"></div>
      <div><label class="label">茹で汁(お玉0.5)</label><input id="ladle" name="ladle" type="number" step="0.5" class="input" placeholder="1.0"></div>
    </div>

    <div class="text-sm text-gray-500" id="saltPercentage"></div>

    <!-- 5大要素セクション -->
    <section class="card space-y-4">
      <h3 class="text-lg font-semibold">5大要素（使った項目のみ）</h3>
      <div class="space-y-3">
        <!-- トマト -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedPomodoro" class="mt-1">
          <div class="flex-1">
            <label for="usedPomodoro" class="label cursor-pointer">トマト（Pomodoro）</label>
            <select id="pomodoroDetail" class="input text-sm hidden" disabled>
              <option value="">選択してください</option>
              <option value="ソース">ソース</option>
              <option value="ホール缶">ホール缶</option>
              <option value="生トマト">生トマト</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <!-- にんにく -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedAglio" class="mt-1">
          <div class="flex-1">
            <label for="usedAglio" class="label cursor-pointer">にんにく（Aglio）</label>
            <select id="aglioDetail" class="input text-sm hidden" disabled>
              <option value="">選択してください</option>
              <option value="スライス">スライス</option>
              <option value="みじん切り">みじん切り</option>
              <option value="ホールをつぶす">ホールをつぶす</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <!-- オリーブオイル -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedOlio" class="mt-1">
          <div class="flex-1">
            <label for="usedOlio" class="label cursor-pointer">オリーブオイル（Olio d'Oliva）</label>
            <select id="olioDetail" class="input text-sm hidden" disabled>
              <option value="">選択してください</option>
              <option value="加熱用のみ">加熱用のみ</option>
              <option value="仕上げ用のみ">仕上げ用のみ</option>
              <option value="両方">両方</option>
            </select>
          </div>
        </div>

        <!-- バター -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedBurro" class="mt-1">
          <div class="flex-1">
            <label for="usedBurro" class="label cursor-pointer">バター（Burro）</label>
            <input id="burroDetail" type="text" class="input text-sm hidden" placeholder="ブランド名など" disabled>
          </div>
        </div>

        <!-- パルミジャーノ -->
        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedParmigiano" class="mt-1">
          <div class="flex-1">
            <label for="usedParmigiano" class="label cursor-pointer">パルミジャーノ（Parmigiano）</label>
            <select id="parmigianoDetail" class="input text-sm hidden" disabled>
              <option value="">選択してください</option>
              <option value="ブロック削り">ブロック削り</option>
              <option value="パウダー">パウダー</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- サブ要素セクション -->
    <section class="card space-y-4">
      <h3 class="text-lg font-semibold">サブ要素（使った項目のみ）</h3>
      <div class="space-y-3">
        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedChiliOil" class="mt-1">
          <div class="flex-1">
            <label for="usedChiliOil" class="label cursor-pointer">唐辛子オイル</label>
            <input id="chiliOilNote" type="text" class="input text-sm hidden" placeholder="メモ（任意）" disabled>
          </div>
        </div>

        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedAnchovy" class="mt-1">
          <div class="flex-1">
            <label for="usedAnchovy" class="label cursor-pointer">アンチョビ</label>
            <input id="anchovyNote" type="text" class="input text-sm hidden" placeholder="メモ（任意）" disabled>
          </div>
        </div>

        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedCheeses" class="mt-1">
          <div class="flex-1">
            <label for="usedCheeses" class="label cursor-pointer">チーズ各種</label>
            <input id="cheesesItems" type="text" class="input text-sm hidden" placeholder="種類をカンマ区切りで（例：ペコリーノ、ゴルゴンゾーラ）" disabled>
          </div>
        </div>

        <div class="flex items-start gap-3">
          <input type="checkbox" id="usedCream" class="mt-1">
          <div class="flex-1">
            <label for="usedCream" class="label cursor-pointer">生クリーム</label>
            <input id="creamNote" type="text" class="input text-sm hidden" placeholder="メモ（任意）" disabled>
          </div>
        </div>
      </div>
    </section>

    <!-- 香り要素セクション -->
    <section class="card space-y-4">
      <h3 class="text-lg font-semibold">香り要素</h3>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="aromaItalianParsley">
          <span class="text-sm">イタリアンパセリ</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="aromaBasil">
          <span class="text-sm">バジル</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="aromaRosemary">
          <span class="text-sm">ローズマリー</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="aromaSage">
          <span class="text-sm">セージ</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="aromaLemon">
          <span class="text-sm">レモン</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" id="aromaBlackPepper">
          <span class="text-sm">黒胡椒</span>
        </label>
      </div>
      <div>
        <label class="label">その他の香り要素</label>
        <input id="aromaOther" type="text" class="input text-sm" placeholder="例：オレガノ、タイム">
      </div>
    </section>

    <!-- 具材セクション -->
    <section class="card space-y-4">
      <h3 class="text-lg font-semibold">具材</h3>
      <div>
        <label class="label">旨味系具材</label>
        <input id="umamiIngredients" type="text" class="input" placeholder="例：グアンチャーレ、パンチェッタ、生ハム、牡蠣（カンマ区切り）">
        <p class="text-xs text-gray-500 mt-1">ソース構成に影響する具材を記録</p>
      </div>
      <div>
        <label class="label">その他具材</label>
        <input id="otherIngredients" type="text" class="input" placeholder="例：ナス、ズッキーニ、エビ（カンマ区切り）">
        <p class="text-xs text-gray-500 mt-1">野菜、魚介など</p>
      </div>
    </section>

    <!-- 評価スコアセクション -->
    <section class="card space-y-4">
      <h3 class="text-lg font-semibold">評価スコア（5段階）</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="label">麺の質</label>
          <div class="flex gap-1" id="pastaQualityStars">
            <button type="button" class="star-btn" data-rating="1">★</button>
            <button type="button" class="star-btn" data-rating="2">★</button>
            <button type="button" class="star-btn" data-rating="3">★</button>
            <button type="button" class="star-btn" data-rating="4">★</button>
            <button type="button" class="star-btn" data-rating="5">★</button>
          </div>
          <input id="pastaQuality" name="pastaQuality" type="hidden">
        </div>
        <div>
          <label class="label">塩加減</label>
          <div class="flex gap-1" id="saltBalanceStars">
            <button type="button" class="star-btn" data-rating="1">★</button>
            <button type="button" class="star-btn" data-rating="2">★</button>
            <button type="button" class="star-btn" data-rating="3">★</button>
            <button type="button" class="star-btn" data-rating="4">★</button>
            <button type="button" class="star-btn" data-rating="5">★</button>
          </div>
          <input id="saltBalance" name="saltBalance" type="hidden">
        </div>
        <div>
          <label class="label">ソース・食材のバランス</label>
          <div class="flex gap-1" id="sauceBalanceStars">
            <button type="button" class="star-btn" data-rating="1">★</button>
            <button type="button" class="star-btn" data-rating="2">★</button>
            <button type="button" class="star-btn" data-rating="3">★</button>
            <button type="button" class="star-btn" data-rating="4">★</button>
            <button type="button" class="star-btn" data-rating="5">★</button>
          </div>
          <input id="sauceBalance" name="sauceBalance" type="hidden">
        </div>
        <div>
          <label class="label">全体の完成度</label>
          <div class="flex gap-1" id="overallStars">
            <button type="button" class="star-btn" data-rating="1">★</button>
            <button type="button" class="star-btn" data-rating="2">★</button>
            <button type="button" class="star-btn" data-rating="3">★</button>
            <button type="button" class="star-btn" data-rating="4">★</button>
            <button type="button" class="star-btn" data-rating="5">★</button>
          </div>
          <input id="overall" name="overall" type="hidden">
        </div>
      </div>
    </section>

    <div><label class="label">レシピ参考</label>
      <input id="recipeReference" name="recipeReference" type="text" class="input" placeholder="参考にしたレシピのURL、書籍名、動画リンクなど">
    </div>

    <div><label class="label">前回から変えたこと・今回の気づき</label>
      <textarea id="feedback" name="feedback" rows="3" class="input" placeholder="例：茹で汁の量を前回より増やした／にんにくをみじん切りに変えた／塩を控えめにした"></textarea>
    </div>

    <div class="flex gap-3">
      <button type="submit" class="btn btn-primary">保存</button>
      <a class="btn" href="/log-list.html">キャンセル</a>
    </div>
  </form>
</main>

<script type="module" src="/src/logNew.js"></script>
</body></html>
